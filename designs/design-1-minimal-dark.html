<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracklist — Design 1: Minimal Dark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      line-height: 1.5;
    }
    .header {
      background: #1a1a1a;
      padding: 16px;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .feed {
      padding: 12px;
      max-width: 100%;
    }
    .clip-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: #1a1a1a;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: background 0.2s;
    }
    .clip-card:hover {
      background: #222;
      border-color: #0a7ea4;
    }
    .art {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      background: #333;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 24px;
    }
    .body {
      flex: 1;
      min-width: 0;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist {
      font-size: 13px;
      color: #999;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    .status {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 700;
      text-transform: uppercase;
      background: #0a7ea4;
      color: #fff;
      font-size: 9px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Community Feed</div>
  </div>
  <div class="feed">
    <div class="clip-card">
      <div class="art">♫</div>
      <div class="body">
        <div class="title">Strings of Life</div>
        <div class="artist">Derrick May</div>
        <div class="meta">Sarah · Printworks<span class="status">matched</span></div>
      </div>
    </div>
    <div class="clip-card">
      <div class="art">♫</div>
      <div class="body">
        <div class="title">Untitled Track</div>
        <div class="artist">Help ID it below</div>
        <div class="meta">Mike · Fabric<span class="status">community</span></div>
      </div>
    </div>
    <div class="clip-card">
      <div class="art">♫</div>
      <div class="body">
        <div class="title">Deep Space Funk</div>
        <div class="artist">Unknown Artist</div>
        <div class="meta">Alex · Warehouse<span class="status">unmatched</span></div>
      </div>
    </div>
  </div>
</body>
</html>
